name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
      env:
        GONOPROXY: github.com/TypeFox/go-lsp

    - name: Download dependencies
      run: go mod download
      env:
        GONOPROXY: github.com/TypeFox/go-lsp

    - name: Verify dependencies
      run: go mod verify
      env:
        GONOPROXY: github.com/TypeFox/go-lsp

    - name: Build
      run: go build -v ./...
      env:
        GONOPROXY: github.com/TypeFox/go-lsp

    - name: Run tests
      run: go test -v -race ./...
      env:
        GONOPROXY: github.com/TypeFox/go-lsp

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
      env:
        GONOPROXY: github.com/TypeFox/go-lsp

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.2.1
        args: --timeout=5m