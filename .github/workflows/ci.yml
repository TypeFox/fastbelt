name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Clone go-lsp dependency
      run: git clone https://github.com/TypeFox/go-lsp.git

    - name: Fix Go version in go-lsp
      run: sed -i 's/go 1.24.5/go 1.23/' go-lsp/go.mod

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Verify workspace setup
      run: |
        echo "Checking go.work file:"
        cat go.work
        echo "Verifying workspace modules:"
        go work use -r .
        go work sync

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Clone go-lsp dependency
      run: git clone https://github.com/TypeFox/go-lsp.git

    - name: Fix Go version in go-lsp
      run: sed -i 's/go 1.24.5/go 1.23/' go-lsp/go.mod

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Verify workspace setup
      run: |
        echo "Checking go.work file:"
        cat go.work
        echo "Verifying workspace modules:"
        go work use -r .
        go work sync

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m